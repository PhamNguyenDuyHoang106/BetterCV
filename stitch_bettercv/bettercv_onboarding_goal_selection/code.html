<body class="bg-background radial-gradient-bg min-h-screen text-on-background font-body-md text-body-md antialiased flex flex-col items-center py-section-gap px-container-margin md:px-0">
<!-- Header & Brand -->
<header class="w-full max-w-3xl flex flex-col items-center mb-section-gap">
<h1 class="font-hero-title text-hero-title md:font-hero-title md:text-hero-title text-primary mb-stack-md tracking-tight">BetterCV</h1>
<!-- Stepper Indicator -->
<div class="flex items-center space-x-4 w-full max-w-sm">
<!-- Step 1: Checked -->
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
</div>
<div class="flex-1 h-px bg-primary/30"></div>
<!-- Step 2: Checked -->
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
</div>
<div class="flex-1 h-px bg-primary/30"></div>
<!-- Step 3: Active -->
<div class="flex flex-col items-center relative">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-[0_0_12px_rgba(93,173,226,0.6)] ring-4 ring-primary-container/30">
<span class="font-label-sm text-label-sm">3</span>
</div>
<span class="absolute -bottom-6 whitespace-nowrap font-label-sm text-label-sm text-primary">Active</span>
</div>
<div class="flex-1 h-px bg-outline-variant"></div>
<!-- Step 4: Unchecked -->
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center text-text-secondary border border-outline-variant">
<span class="font-label-sm text-label-sm">4</span>
</div>
</div>
</div>
</header>
<!-- Central Card -->
<main class="w-full max-w-[600px] bg-glass-bg backdrop-blur-md border border-glass-border rounded-2xl shadow-sm p-card-padding flex flex-col relative z-10 transition-transform duration-300 hover:-translate-y-0.5 hover:shadow-md">
<!-- Header area -->
<div class="text-center mb-stack-md pb-stack-md border-b border-glass-border/50">
<h2 class="font-section-title text-section-title text-text-primary mb-stack-sm">What is your primary career goal?</h2>
<p class="font-body-md text-body-md text-text-secondary max-w-md mx-auto">BetterCV will optimize your resume templates and AI suggestions based on your target environment.</p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-grid-gutter mb-section-gap">
<!-- Card 1 -->
<label class="group relative flex flex-col p-stack-md rounded-xl bg-white/40 border border-white/30 backdrop-blur-sm cursor-pointer hover:bg-white/60 transition-colors shadow-sm">
<input class="peer sr-only" name="goal" type="radio" value="remote"/>
<div class="flex items-start mb-stack-sm text-text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">public</span>
<h3 class="ml-stack-sm font-label-md text-label-md text-text-primary mt-1 group-hover:text-primary transition-colors">Land a Remote Job</h3>
</div>
<p class="font-label-sm text-label-sm text-text-secondary font-normal flex-1">Maximize remote-work keywords and international standards.</p>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
</label>
<!-- Card 2 (ACTIVE) -->
<label class="group relative flex flex-col p-stack-md rounded-xl bg-primary/5 border border-primary/40 backdrop-blur-sm cursor-pointer shadow-[0_0_15px_rgba(93,173,226,0.2)]">
<input checked="" class="peer sr-only" name="goal" type="radio" value="startup"/>
<div class="absolute top-3 right-3 w-5 h-5 bg-primary rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined text-[14px] font-bold">check</span>
</div>
<div class="flex items-start mb-stack-sm text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<h3 class="ml-stack-sm font-label-md text-label-md text-primary mt-1">Target Tech Startups</h3>
</div>
<p class="font-label-sm text-label-sm text-text-secondary font-normal flex-1">Emphasize growth, agility, and modern tech stack skills.</p>
<div class="absolute inset-0 rounded-xl border-2 border-primary shadow-[0_0_8px_rgba(93,173,226,0.3)] pointer-events-none"></div>
</label>
<!-- Card 3 -->
<label class="group relative flex flex-col p-stack-md rounded-xl bg-white/40 border border-white/30 backdrop-blur-sm cursor-pointer hover:bg-white/60 transition-colors shadow-sm">
<input class="peer sr-only" name="goal" type="radio" value="corporate"/>
<div class="flex items-start mb-stack-sm text-text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">domain</span>
<h3 class="ml-stack-sm font-label-md text-label-md text-text-primary mt-1 group-hover:text-primary transition-colors">Apply to Corporate Roles</h3>
</div>
<p class="font-label-sm text-label-sm text-text-secondary font-normal flex-1">Standardize layouts for strict corporate ATS systems.</p>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
</label>
<!-- Card 4 -->
<label class="group relative flex flex-col p-stack-md rounded-xl bg-white/40 border border-white/30 backdrop-blur-sm cursor-pointer hover:bg-white/60 transition-colors shadow-sm">
<input class="peer sr-only" name="goal" type="radio" value="internship"/>
<div class="flex items-start mb-stack-sm text-text-secondary group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">school</span>
<h3 class="ml-stack-sm font-label-md text-label-md text-text-primary mt-1 group-hover:text-primary transition-colors">Secure an Internship</h3>
</div>
<p class="font-label-sm text-label-sm text-text-secondary font-normal flex-1">Highlight academic projects, education, and fast learning.</p>
<div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 transition-all"></div>
</label>
</div>

<div class="flex justify-between items-center mt-auto pt-stack-md border-t border-glass-border/50">
<button class="px-6 py-3 rounded-full bg-primary-container/20 border border-white/40 font-label-md text-label-md text-primary hover:bg-primary-container/30 transition-colors flex items-center shadow-sm" type="button">
<span class="material-symbols-outlined mr-2 text-sm">arrow_back</span>

</button>
