name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx --workspace=apps/api prisma generate

      - name: Lint API
        run: npm run lint:api

      - name: Lint Web
        run: npm run lint:web

      - name: Type-check API
        run: npm --workspace=apps/api run build

      - name: Type-check Web
        run: npm --workspace=apps/web run build

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Template Engine Tests
        run: npm --workspace=packages/template-engine run test
