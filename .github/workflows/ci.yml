name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx --workspace=apps/api prisma generate

      - name: Lint API
        run: npm run lint:api

      - name: Lint Web
        run: npm run lint:web

      - name: Type-check API
        run: npm --workspace=apps/api run build

      - name: Type-check Web
        run: npm --workspace=apps/web run build

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Template Engine Tests
        run: npm --workspace=packages/template-engine run test

      - name: Run Database Migrations
        run: npx --workspace=apps/api prisma db push
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres

      - name: Execute ATS Integration Regression Shield
        run: npm --workspace=apps/api run test:integration
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Execute Health & Observability Integration Tests
        run: npm --workspace=apps/api run test:health
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
          COMMIT_SHA: ${{ github.sha }}

