version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bettercv
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "4000:4000"
    env_file:
      - ../../.env
    depends_on:
      - db
      - redis

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
