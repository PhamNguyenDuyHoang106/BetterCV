# Bước 1: Chỉ HTTP – dùng để lấy SSL cert từ Let's Encrypt (Certbot)
# Sau khi có cert, thay bằng nginx.prod.conf

server {
    listen 80;
    server_name _;

    # Cấu hình tăng kích thước bộ đệm để tránh lỗi 502 Bad Gateway khi Supabase trả về Cookie OAuth lớn
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://web:3000/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API (NestJS đã có globalPrefix='api', nên giữ nguyên /api/ trong URL)
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
